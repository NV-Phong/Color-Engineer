<!doctype html>
<html>
   <head>
      <style>
         :root {
            --background: 0 0% 100%;
            --foreground: 240 10% 3.9%;
            --card: 0 0% 100%;
            --card-foreground: 240 10% 3.9%;
            --primary: 240 5.9% 10%;
            --primary-foreground: 0 0% 98%;
            --border: 240 5.9% 90%;
            --input: 240 5.9% 90%;
            --ring: 240 10% 3.9%;
            --radius: 0.75rem;
         }

         * {
            box-sizing: border-box;
         }

         /* Hide scrollbar for Chrome, Safari and Opera */
         *::-webkit-scrollbar {
            display: none;
         }

         /* Hide scrollbar for IE, Edge and Firefox */
         * {
            -ms-overflow-style: none; /* IE and Edge */
            scrollbar-width: none; /* Firefox */
         }

         body {
            font-family: "Inter", sans-serif;
            margin: 0;
            padding: 0;
            background-color: hsl(var(--background));
            color: hsl(var(--foreground));
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow-y: auto;
            font-size: 14px;
            -webkit-font-smoothing: antialiased;
         }

         .container {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            margin-bottom: auto;
         }

         .header-wrapper {
            display: flex;
            flex-direction: column;
            gap: 6px;
         }

         .header-title-group {
            display: flex;
            align-items: center;
            gap: 8px;
         }

         .header-icon {
            color: hsl(var(--primary));
         }

         .header-icon svg {
            width: 20px;
            height: 20px;
            stroke-width: 2.5;
         }

         .header-text {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.015em;
            margin: 0;
         }

         .header-description {
            font-size: 13px;
            color: hsl(240 3.8% 46.1%); /* muted foreground */
            margin: 0;
         }

         .card {
            background-color: hsl(var(--card));
            color: hsl(var(--card-foreground));
            border: 1px solid hsl(var(--border));
            border-radius: var(--radius);
            padding: 16px;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            gap: 16px;
         }

         .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 500;
            font-size: 14px;
         }

         .preview-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
         }

         .color-preview {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: hsl(0, 100%, 50%);
            border: 1px solid rgba(0, 0, 0, 0.1);
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            transition: background-color 0.1s;
         }

         .input-group {
            position: relative;
            display: flex;
            align-items: center;
         }

         .value-display {
            display: flex;
            height: 32px;
            width: 64px;
            border-radius: calc(var(--radius) - 2px);
            border: 1px solid hsl(var(--input));
            background-color: transparent;
            padding: 4px 8px 4px 8px;
            font-size: 13px;
            font-family: inherit;
            text-align: left;
            transition:
               border-color 0.2s,
               box-shadow 0.2s;
            outline: none;
         }

         .value-display:focus-visible {
            outline: none;
            border-color: hsl(var(--ring));
            box-shadow: 0 0 0 1px hsl(var(--ring));
         }

         .degrees-symbol {
            position: absolute;
            right: 8px;
            color: hsl(240 3.8% 46.1%);
            font-size: 13px;
            pointer-events: none;
         }

         /* Slider styling simulating shadcn */
         .slider-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
            touch-action: none;
            user-select: none;
         }

         .slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 8px;
            border-radius: 9999px;
            background: linear-gradient(
               to right,
               #f00 0%,
               #ff0 17%,
               #0f0 33%,
               #0ff 50%,
               #00f 67%,
               #f0f 83%,
               #f00 100%
            );
            outline: none;
            margin: 8px 0;
         }

         .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: hsl(var(--background));
            border: 2px solid hsl(var(--primary));
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            cursor: pointer;
            transition: all 0.15s ease;
         }

         .slider::-webkit-slider-thumb:hover {
            transform: scale(1.1);
         }

         .slider::-webkit-slider-thumb:active {
            cursor: grabbing;
         }

         .actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: auto;
         }

         button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            border-radius: calc(var(--radius) - 2px);
            font-size: 13px;
            font-weight: 500;
            height: 36px;
            padding: 0 16px;
            cursor: pointer;
            transition:
               background-color 0.2s,
               color 0.2s;
            outline: none;
            font-family: inherit;
         }

         button:focus-visible {
            box-shadow:
               0 0 0 2px hsl(var(--background)),
               0 0 0 4px hsl(var(--ring));
         }

         .btn-cancel {
            background-color: transparent;
            color: hsl(var(--foreground));
            border: 1px solid hsl(var(--input));
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
         }

         .btn-cancel:hover {
            background-color: hsl(240 4.8% 95.9%); /* accent */
            color: hsl(240 5.9% 10%); /* accent foreground */
         }

         .btn-apply {
            background-color: hsl(var(--primary));
            color: hsl(var(--primary-foreground));
            border: 1px solid transparent;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
         }

         .btn-apply:hover:not(:disabled) {
            background-color: hsl(var(--primary) / 0.9);
         }

         .btn-apply:disabled {
            opacity: 0.5;
            cursor: not-allowed;
         }

         .progress-container {
            display: none;
            flex-direction: column;
            gap: 6px;
            margin-top: 8px;
         }

         .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: hsl(240 3.8% 46.1%);
         }

         .progress-track {
            height: 6px;
            width: 100%;
            background-color: hsl(var(--border));
            border-radius: 9999px;
            overflow: hidden;
         }

         .progress-fill {
            height: 100%;
            width: 0%;
            background-color: hsl(var(--primary));
            border-radius: 9999px;
            transition: width 0.1s ease-out;
         }

         /* Switch CSS */
         .switch-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 16px;
            border-bottom: 1px solid hsl(var(--border));
            margin-bottom: 4px;
         }
         .switch-label-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
         }
         .switch {
            width: 40px;
            height: 24px;
            background-color: hsl(var(--input));
            border-radius: 9999px;
            position: relative;
            cursor: pointer;
            border: 2px solid transparent;
            transition: background-color 0.2s;
            outline: none;
         }
         .switch[aria-checked="true"] {
            background-color: hsl(var(--primary));
         }
         .switch-thumb {
            width: 20px;
            height: 20px;
            background-color: hsl(var(--background));
            border-radius: 50%;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
            position: absolute;
            top: 0;
            left: 0;
            transition: transform 0.2s;
         }
         .switch[aria-checked="true"] .switch-thumb {
            transform: translateX(16px);
         }
         .switch:focus-visible {
            box-shadow:
               0 0 0 2px hsl(var(--background)),
               0 0 0 4px hsl(var(--ring));
         }

         .color-item-row {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid hsl(var(--border));
         }
         .color-item-row:last-child {
            border-bottom: none;
            padding-bottom: 0;
         }
         #individual-list {
            display: flex;
            flex-direction: column;
            max-height: 220px;
            overflow-y: auto;
            padding-right: 4px;
         }
      </style>
   </head>
   <body>
      <div class="container" id="main-container">
         <div class="header-wrapper">
            <div class="header-title-group">
               <div class="header-icon">
                  <svg
                     xmlns="http://www.w3.org/2000/svg"
                     width="24"
                     height="24"
                     viewBox="0 0 24 24"
                     fill="none"
                     stroke="currentColor"
                     stroke-linecap="round"
                     stroke-linejoin="round"
                  >
                     <circle cx="13.5" cy="6.5" r=".5" fill="currentColor" />
                     <circle cx="17.5" cy="10.5" r=".5" fill="currentColor" />
                     <circle cx="8.5" cy="7.5" r=".5" fill="currentColor" />
                     <circle cx="6.5" cy="12.5" r=".5" fill="currentColor" />
                     <path
                        d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"
                     />
                  </svg>
               </div>
               <h2 class="header-text">Hue Shift</h2>
            </div>
            <p class="header-description">
               Adjust the hue angle for selected objects.
            </p>
         </div>

         <div class="card">
            <div class="switch-row">
               <div class="switch-label-group">
                  <span style="font-weight: 500; font-size: 14px"
                     >Individual Colors</span
                  >
                  <span style="font-size: 12px; color: hsl(240 3.8% 46.1%)"
                     >Adjust original hues separately</span
                  >
               </div>
               <button
                  id="modeSwitch"
                  class="switch"
                  role="switch"
                  aria-checked="false"
               >
                  <span class="switch-thumb"></span>
               </button>
            </div>

            <!-- Single Mode -->
            <div
               id="single-mode-container"
               style="display: flex; flex-direction: column; gap: 16px"
            >
               <div class="label-row">
                  <span>Target Hue Angle</span>
                  <div class="preview-wrapper">
                     <div class="color-preview" id="single-color-preview"></div>
                     <div class="input-group">
                        <input
                           type="number"
                           id="single-hueInput"
                           class="value-display"
                           value="0"
                           min="0"
                           max="360"
                        />
                        <span class="degrees-symbol">°</span>
                     </div>
                  </div>
               </div>
               <div class="slider-wrapper">
                  <input
                     type="range"
                     id="single-hueSlider"
                     class="slider"
                     min="0"
                     max="360"
                     value="0"
                  />
               </div>
            </div>

            <!-- Individual Mode -->
            <div
               id="individual-mode-container"
               style="display: none; flex-direction: column; gap: 4px"
            >
               <div
                  id="empty-state"
                  style="
                     font-size: 13px;
                     color: hsl(240 3.8% 46.1%);
                     text-align: center;
                     padding: 12px 0;
                     display: none;
                  "
               >
                  No color objects found in selection.
               </div>
               <div
                  id="individual-list"
                  style="
                     display: flex;
                     flex-direction: column;
                     max-height: 220px;
                     overflow-y: auto;
                     padding-right: 4px;
                  "
               >
                  <!-- Injected via JS -->
               </div>
            </div>

            <div class="progress-container" id="progress-container">
               <div class="progress-info">
                  <span class="progress-label">Applying changes...</span>
                  <span class="progress-percent" id="progress-percent">0%</span>
               </div>
               <div class="progress-track">
                  <div class="progress-fill" id="progress-fill"></div>
               </div>
            </div>
         </div>

         <div class="actions">
            <button id="cancel" class="btn-cancel">Cancel</button>
            <button id="apply" class="btn-apply">Apply Changes</button>
         </div>
      </div>

      <script>
         let isIndividualMode = false;
         let hueMap = {};

         const modeSwitch = document.getElementById("modeSwitch");
         const singleModeContainer = document.getElementById(
            "single-mode-container",
         );
         const individualModeContainer = document.getElementById(
            "individual-mode-container",
         );
         const individualList = document.getElementById("individual-list");
         const emptyState = document.getElementById("empty-state");

         const singleHueInput = document.getElementById("single-hueInput");
         const singleHueSlider = document.getElementById("single-hueSlider");
         const singleColorPreview = document.getElementById(
            "single-color-preview",
         );

         const applyBtn = document.getElementById("apply");
         const progressContainer =
            document.getElementById("progress-container");
         const progressFill = document.getElementById("progress-fill");
         const progressPercent = document.getElementById("progress-percent");

         // Auto-resize the UI height to exactly fit contents
         function resizeUI() {
            setTimeout(() => {
               const container = document.getElementById("main-container");
               let height = container.getBoundingClientRect().height;
               // Maximum height allowed by our modal visually before scrolling internally
               // To avoid it going off-screen on smaller laptops.
               const maxH = 600;

               parent.postMessage(
                  {
                     pluginMessage: {
                        type: "resize",
                        height: Math.min(height, maxH),
                     },
                  },
                  "*",
               );
            }, 0);
         }

         setTimeout(resizeUI, 50);

         modeSwitch.addEventListener("click", () => {
            isIndividualMode = !isIndividualMode;
            modeSwitch.setAttribute("aria-checked", isIndividualMode);

            singleModeContainer.style.display = isIndividualMode
               ? "none"
               : "flex";
            individualModeContainer.style.display = isIndividualMode
               ? "flex"
               : "none";

            parent.postMessage(
               {
                  pluginMessage: {
                     type: "set-mode",
                     isIndividual: isIndividualMode,
                  },
               },
               "*",
            );
            resizeUI();
         });

         function syncSingleHue(value) {
            let h = Math.max(0, Math.min(360, parseInt(value) || 0));
            singleHueInput.value = h;
            singleHueSlider.value = h;
            singleColorPreview.style.backgroundColor = `hsl(${h}, 100%, 50%)`;
         }

         singleHueInput.addEventListener("input", (e) =>
            syncSingleHue(e.target.value),
         );
         singleHueSlider.addEventListener("input", (e) =>
            syncSingleHue(e.target.value),
         );

         function renderIndividualColors(colors) {
            individualList.innerHTML = "";
            hueMap = {};

            if (colors.length === 0) {
               emptyState.style.display = "block";
               individualList.style.display = "none";
            } else {
               emptyState.style.display = "none";
               individualList.style.display = "flex";

               colors.forEach((c) => {
                  hueMap[c.key] = c.h;
                  const safeId = "hue_" + c.key.toLowerCase();

                  const row = document.createElement("div");
                  row.className = "color-item-row";
                  row.innerHTML = `
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <div style="display: flex; align-items: center; gap: 8px;">
                <div class="color-preview" id="prev_${safeId}" style="background-color: hsl(${c.h}, ${c.s * 100}%, ${c.l * 100}%)"></div>
                <div style="font-size: 13px; font-weight: 500;">${c.key}</div>
              </div>
              <div class="input-group">
                <input type="number" class="value-display" value="${c.h}" min="0" max="360" id="in_${safeId}">
                <span class="degrees-symbol">°</span>
              </div>
            </div>
            <div class="slider-wrapper">
              <input type="range" class="slider" min="0" max="360" value="${c.h}" id="sl_${safeId}">
            </div>
          `;
                  individualList.appendChild(row);

                  const inp = document.getElementById(`in_${safeId}`);
                  const sld = document.getElementById(`sl_${safeId}`);
                  const prev = document.getElementById(`prev_${safeId}`);

                  function updateSubHue(val) {
                     let h = Math.max(0, Math.min(360, parseInt(val) || 0));
                     inp.value = h;
                     sld.value = h;
                     hueMap[c.key] = h;
                     prev.style.backgroundColor = `hsl(${h}, ${c.s * 100}%, ${c.l * 100}%)`;
                  }

                  inp.addEventListener("input", (e) =>
                     updateSubHue(e.target.value),
                  );
                  sld.addEventListener("input", (e) =>
                     updateSubHue(e.target.value),
                  );
               });
            }
            resizeUI();
         }

         applyBtn.onclick = () => {
            applyBtn.disabled = true;
            progressContainer.style.display = "flex";
            progressFill.style.width = "0%";
            progressPercent.textContent = "0%";
            resizeUI();

            if (isIndividualMode) {
               parent.postMessage(
                  {
                     pluginMessage: {
                        type: "change-hue",
                        mode: "individual",
                        hueMap: hueMap,
                     },
                  },
                  "*",
               );
            } else {
               const hue = parseInt(singleHueInput.value, 10);
               parent.postMessage(
                  {
                     pluginMessage: {
                        type: "change-hue",
                        mode: "single",
                        hue: hue,
                     },
                  },
                  "*",
               );
            }
         };

         document.getElementById("cancel").onclick = () => {
            parent.postMessage({ pluginMessage: { type: "cancel" } }, "*");
         };

         window.onmessage = (event) => {
            const msg = event.data.pluginMessage;
            if (msg.type === "progress") {
               progressFill.style.width = `${msg.value}%`;
               progressPercent.textContent = `${msg.value}%`;
            } else if (msg.type === "complete") {
               setTimeout(() => {
                  applyBtn.disabled = false;
                  progressContainer.style.display = "none";
                  resizeUI();
               }, 500);
            } else if (msg.type === "analyzed-colors") {
               renderIndividualColors(msg.colors);
            }
         };
      </script>
   </body>
</html>
